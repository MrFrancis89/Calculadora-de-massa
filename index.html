<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora de Receitas Planilha</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

        /* ── Variáveis de Cores baseadas na imagem ── */
        :root {
            --bg-geral: #2D2D2D;
            --azul-cabecalho: #2A4875;
            --castanho: #8B4513;
            --amarelo-farinha: #FFC000;
            --roxo-ingrediente: #7030A0;
            --cinza-percentagem: #595959;
            --azul-claro-gramas: #4A7EBB;
            --borda: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-geral);
            color: white;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .planilha-container {
            width: 100%;
            max-width: 500px;
            background-color: #333;
            padding: 10px;
        }

        /* ── Cabeçalho e Nova Receita ── */
        .titulo-principal {
            background-color: var(--azul-cabecalho);
            text-align: center;
            padding: 12px;
            font-weight: 700;
            border: 1px solid var(--borda);
            margin-bottom: 10px;
        }

        .linha-alvo {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .linha-alvo .etiqueta {
            flex: 1;
            background-color: var(--castanho);
            text-align: center;
            padding: 8px;
            font-weight: 700;
            border: 1px solid var(--borda);
        }

        .linha-alvo input {
            width: 120px;
            background-color: var(--azul-claro-gramas);
            color: white;
            font-weight: 700;
            text-align: center;
            border: 1px solid var(--borda);
            outline: none;
            font-size: 1rem;
        }

        /* ── Tabela Principal ── */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            border: 1px solid var(--borda);
            text-align: center;
            vertical-align: middle;
            height: 35px;
        }

        th {
            background-color: var(--castanho);
            font-weight: 700;
            padding: 5px;
        }

        /* Cores das colunas e linhas */
        .col-nome input { text-align: right; padding-right: 10px; }
        .col-peso input { text-align: center; }
        .col-perc { background-color: var(--cinza-percentagem); font-weight: 700; }
        .col-gramas { background-color: var(--azul-claro-gramas); font-weight: 700; }

        .linha-farinha .col-nome, .linha-farinha .col-peso {
            background-color: var(--amarelo-farinha);
            color: black;
            font-weight: 700;
        }
        .linha-farinha input { color: black; font-weight: 700; }

        .linha-ingrediente .col-nome, .linha-ingrediente .col-peso {
            background-color: var(--roxo-ingrediente);
        }

        /* ── Inputs dentro da tabela ── */
        table input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-family: inherit;
            font-size: inherit;
        }
        table input::placeholder { color: rgba(255,255,255,0.4); }

        /* ── Rodapé (Totais) ── */
        tfoot td {
            background-color: var(--castanho);
            font-weight: 700;
            padding: 8px 5px;
        }
        .footer-label {
            text-align: left;
            padding-left: 10px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="planilha-container">
        
        <div class="titulo-principal">CALCULADORA DE RECEITAS</div>

        <div class="linha-alvo">
            <div class="etiqueta">NOVA RECEITA</div>
            <input type="number" id="input-alvo-farinha" value="10000">
        </div>

        <table id="tabela-ingredientes">
            <thead>
                <tr>
                    <th style="width: 45%;">INGREDIENTES</th>
                    <th style="width: 18%;">PESO</th>
                    <th style="width: 18%;">%</th>
                    <th style="width: 19%;">GRAMAS</th>
                </tr>
            </thead>
            <tbody id="lista-ingredientes">
                </tbody>
            <tfoot>
                <tr>
                    <td class="footer-label">PESO TOTAL DA RECEITA</td>
                    <td id="total-peso">0</td>
                    <td id="total-perc">0%</td>
                    <td id="total-gramas">0</td>
                </tr>
            </tfoot>
        </table>

    </div>

    <script>
        // ── 1. ESTADO DA APLICAÇÃO (Os dados da imagem) ──
        // Criamos as linhas exatas que mostraste na imagem, incluindo espaços em branco
        let ingredientes = [
            { id: 0, nome: "farinha", peso: 5000, isFarinha: true },
            { id: 1, nome: "açúcar", peso: 120, isFarinha: false },
            { id: 2, nome: "sal", peso: 120, isFarinha: false },
            { id: 3, nome: "óleo", peso: 300, isFarinha: false },
            { id: 4, nome: "água", peso: 2600, isFarinha: false },
            { id: 5, nome: "fermento", peso: 10, isFarinha: false },
            { id: 6, nome: "", peso: "", isFarinha: false },
            { id: 7, nome: "", peso: "", isFarinha: false },
            { id: 8, nome: "", peso: "", isFarinha: false },
            { id: 9, nome: "", peso: "", isFarinha: false },
            { id: 10, nome: "", peso: "", isFarinha: false }
        ];

        // ── 2. REFERÊNCIAS DO DOM ──
        const tbody = document.getElementById('lista-ingredientes');
        const inputAlvoFarinha = document.getElementById('input-alvo-farinha');
        const txtTotalPeso = document.getElementById('total-peso');
        const txtTotalPerc = document.getElementById('total-perc');
        const txtTotalGramas = document.getElementById('total-gramas');

        // ── 3. FUNÇÃO DE RENDERIZAÇÃO E CÁLCULO ──
        function atualizarPlanilha() {
            tbody.innerHTML = ''; // Limpa a tabela

            // Vamos buscar o valor alvo da "Nova Receita"
            const alvoFarinha = parseFloat(inputAlvoFarinha.value) || 0;
            
            // O peso base da farinha (que está sempre na posição 0) é a nossa referência de 100%
            const pesoBaseFarinha = parseFloat(ingredientes[0].peso) || 1; 

            let somaPesoBase = 0;
            let somaPerc = 0;
            let somaGramas = 0;

            // Percorre todos os ingredientes para criar as linhas e fazer as contas
            ingredientes.forEach((ing, index) => {
                const peso = parseFloat(ing.peso) || 0;
                
                // Matemática: Percentagem em relação à farinha
                const percentagem = (peso / pesoBaseFarinha) * 100;
                
                // Matemática: Novos gramas baseados no alvo pretendido
                const gramas = alvoFarinha * (percentagem / 100);

                // Somatórios para o rodapé
                somaPesoBase += peso;
                somaPerc += percentagem;
                somaGramas += gramas;

                // Criação visual da linha da tabela (<tr>)
                const tr = document.createElement('tr');
                tr.className = ing.isFarinha ? 'linha-farinha' : 'linha-ingrediente';

                // Definimos o código HTML interno dessa linha
                tr.innerHTML = `
                    <td class="col-nome">
                        <input type="text" id="nome-${index}" value="${ing.nome}" placeholder="..." ${ing.isFarinha ? 'readonly' : ''}>
                    </td>
                    <td class="col-peso">
                        <input type="number" id="peso-${index}" value="${ing.peso}">
                    </td>
                    <td class="col-perc">${peso === 0 ? '' : percentagem.toFixed(1) + '%'}</td>
                    <td class="col-gramas">${peso === 0 ? '' : gramas.toFixed(0)}</td>
                `;

                tbody.appendChild(tr);

                // Adicionar "ouvintes" (Event Listeners) para detetar quando o utilizador escreve
                document.getElementById(`nome-${index}`).addEventListener('input', (e) => {
                    ingredientes[index].nome = e.target.value;
                });

                document.getElementById(`peso-${index}`).addEventListener('input', (e) => {
                    ingredientes[index].peso = e.target.value;
                    atualizarPlanilha(); // Recalcula tudo se o peso mudar
                });
            });

            // Atualiza o rodapé com os totais calculados
            txtTotalPeso.textContent = somaPesoBase;
            txtTotalPerc.textContent = somaPerc.toFixed(1) + '%';
            txtTotalGramas.textContent = somaGramas.toFixed(1);
        }

        // ── 4. EVENT LISTENERS GERAIS E ARRANQUE ──
        
        // Se mudarmos o valor de "NOVA RECEITA", a tabela toda recalcula
        inputAlvoFarinha.addEventListener('input', atualizarPlanilha);

        // Arranca a aplicação desenhando a tabela pela primeira vez
        atualizarPlanilha();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora de Pizza - StockFlow Pro</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            /* Cores extraídas do teu StockFlow Pro Dark Premium */
            --bg: #0D0D0F;
            --surface: #1A1A1E;
            --surface-2: #222226;
            --text: #F0F0F3;
            --text-soft: #8A8A8F;
            --border: rgba(255, 255, 255, 0.08);
            --accent-primary: #FF9F0A; /* Laranja Apple */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .calculadora-app {
            background: var(--surface);
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* ── Cabeçalho e Entradas Numéricas ── */
        .header-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .input-group {
            background: var(--surface-2);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .input-group label {
            display: block;
            color: var(--text-soft);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-group input[type="number"] {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--accent-primary);
            font-size: 1.8rem;
            font-weight: 700;
            outline: none;
        }

        /* ── Controlo de Sliders (Percentagens) ── */
        .sliders-container {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .slider-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .slider-row:last-child { margin-bottom: 0; }

        .slider-label {
            width: 30%;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .slider-input {
            width: 45%;
        }

        .slider-input input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: transparent;
        }

        .slider-input input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: var(--surface-2);
            border-radius: 4px;
        }

        .slider-input input[type="range"]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #FFF;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -9px;
            border: 1px solid var(--border);
        }

        .slider-value {
            width: 20%;
            text-align: right;
            font-weight: 600;
            color: var(--text-soft);
        }

        /* ── Resultados (Receita Final) ── */
        .resultados-container h3 {
            font-size: 1rem;
            margin-bottom: 16px;
            color: var(--text-soft);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        .btn-reset {
            background: transparent;
            border: none;
            color: var(--accent-primary);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .resultado-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-size: 1.05rem;
        }

        .resultado-item:last-child { border-bottom: none; }

        .resultado-item .nome { font-weight: 500; }
        .resultado-item .valor { font-weight: 700; color: var(--text); }
        .resultado-item.destaque .valor { color: var(--accent-primary); font-size: 1.2rem;}
    </style>
</head>
<body>

    <div class="calculadora-app">
        
        <div class="header-grid">
            <div class="input-group">
                <label for="input-bolas">Bolas</label>
                <input type="number" id="input-bolas" value="4" min="1" step="1">
            </div>
            <div class="input-group">
                <label for="input-peso">Peso (g)</label>
                <input type="number" id="input-peso" value="250" min="50" step="10">
            </div>
        </div>

        <div class="sliders-container">
            <div class="slider-row">
                <div class="slider-label">Água</div>
                <div class="slider-input">
                    <input type="range" id="slider-agua" min="50" max="100" value="65" step="1">
                </div>
                <div class="slider-value" id="val-agua">65%</div>
            </div>
            
            <div class="slider-row">
                <div class="slider-label">Sal</div>
                <div class="slider-input">
                    <input type="range" id="slider-sal" min="0" max="5" value="2.5" step="0.1">
                </div>
                <div class="slider-value" id="val-sal">2.5%</div>
            </div>

            <div class="slider-row">
                <div class="slider-label">Fermento</div>
                <div class="slider-input">
                    <input type="range" id="slider-fermento" min="0" max="3" value="0.3" step="0.1">
                </div>
                <div class="slider-value" id="val-fermento">0.3%</div>
            </div>

            <div class="slider-row">
                <div class="slider-label">Azeite</div>
                <div class="slider-input">
                    <input type="range" id="slider-azeite" min="0" max="10" value="2.0" step="0.5">
                </div>
                <div class="slider-value" id="val-azeite">2.0%</div>
            </div>
        </div>

        <div class="resultados-container">
            <h3>Receita Exata <button id="btn-reset" class="btn-reset">Limpar</button></h3>
            
            <div class="resultado-item destaque">
                <span class="nome">Massa Total</span>
                <span class="valor" id="res-total">1000g</span>
            </div>
            <div class="resultado-item">
                <span class="nome">Farinha de Trigo</span>
                <span class="valor" id="res-farinha">0g</span>
            </div>
            <div class="resultado-item">
                <span class="nome">Água</span>
                <span class="valor" id="res-agua">0g</span>
            </div>
            <div class="resultado-item">
                <span class="nome">Sal</span>
                <span class="valor" id="res-sal">0g</span>
            </div>
            <div class="resultado-item">
                <span class="nome">Fermento</span>
                <span class="valor" id="res-fermento">0g</span>
            </div>
            <div class="resultado-item">
                <span class="nome">Azeite</span>
                <span class="valor" id="res-azeite">0g</span>
            </div>
        </div>

    </div>

    <script>
        // Objeto que guarda as referências de todos os elementos HTML
        const UI = {
            bolas: document.getElementById('input-bolas'),
            peso: document.getElementById('input-peso'),
            agua: document.getElementById('slider-agua'),
            sal: document.getElementById('slider-sal'),
            fermento: document.getElementById('slider-fermento'),
            azeite: document.getElementById('slider-azeite'),
            // Visores dos Sliders
            valAgua: document.getElementById('val-agua'),
            valSal: document.getElementById('val-sal'),
            valFermento: document.getElementById('val-fermento'),
            valAzeite: document.getElementById('val-azeite'),
            // Visores de Resultado
            resTotal: document.getElementById('res-total'),
            resFarinha: document.getElementById('res-farinha'),
            resAgua: document.getElementById('res-agua'),
            resSal: document.getElementById('res-sal'),
            resFermento: document.getElementById('res-fermento'),
            resAzeite: document.getElementById('res-azeite'),
            // Botão
            btnReset: document.getElementById('btn-reset')
        };

        // Valores Padrão (Default)
        const defaults = {
            bolas: 4,
            peso: 250,
            agua: 65,
            sal: 2.5,
            fermento: 0.3,
            azeite: 2.0
        };

        // Função de formatação (Ex: 15.54 -> "15.5g")
        function formataGrama(valor) {
            return Number(valor.toFixed(1)) + 'g';
        }

        // Função Principal: Executa a Matemática de Padeiro
        function calcularReceita() {
            // 1. Obter valores atuais dos inputs
            const qtdBolas = parseInt(UI.bolas.value) || 1;
            const pesoBola = parseInt(UI.peso.value) || 1;
            
            const percAgua = parseFloat(UI.agua.value);
            const percSal = parseFloat(UI.sal.value);
            const percFermento = parseFloat(UI.fermento.value);
            const percAzeite = parseFloat(UI.azeite.value);

            // 2. Atualizar as etiquetas (labels) dos sliders
            UI.valAgua.textContent = percAgua + '%';
            UI.valSal.textContent = percSal.toFixed(1) + '%';
            UI.valFermento.textContent = percFermento.toFixed(1) + '%';
            UI.valAzeite.textContent = percAzeite.toFixed(1) + '%';

            // 3. MATEMÁTICA DE PADEIRO
            const massaTotal = qtdBolas * pesoBola;
            
            // Soma de todas as percentagens (Farinha é sempre 100% ou 1.0)
            const somaPercentagens = 1 + (percAgua/100) + (percSal/100) + (percFermento/100) + (percAzeite/100);
            
            // A farinha é a âncora de todo o cálculo
            const pesoFarinha = massaTotal / somaPercentagens;

            // 4. Renderizar resultados no DOM (usando textContent para performance, como no teu tabela.js)
            UI.resTotal.textContent = formataGrama(massaTotal);
            UI.resFarinha.textContent = formataGrama(pesoFarinha);
            UI.resAgua.textContent = formataGrama(pesoFarinha * (percAgua / 100));
            UI.resSal.textContent = formataGrama(pesoFarinha * (percSal / 100));
            UI.resFermento.textContent = formataGrama(pesoFarinha * (percFermento / 100));
            UI.resAzeite.textContent = formataGrama(pesoFarinha * (percAzeite / 100));
        }

        // Função de Reset
        function resetarValores() {
            UI.bolas.value = defaults.bolas;
            UI.peso.value = defaults.peso;
            UI.agua.value = defaults.agua;
            UI.sal.value = defaults.sal;
            UI.fermento.value = defaults.fermento;
            UI.azeite.value = defaults.azeite;
            
            if (navigator.vibrate) navigator.vibrate(20); // Haptic Feedback
            calcularReceita();
        }

        // Adicionar Listeners a todos os inputs para calcular em tempo real
        [UI.bolas, UI.peso, UI.agua, UI.sal, UI.fermento, UI.azeite].forEach(input => {
            input.addEventListener('input', () => {
                if (navigator.vibrate && input.type === 'range') navigator.vibrate(10);
                calcularReceita();
            });
        });

        UI.btnReset.addEventListener('click', resetarValores);

        // Inicializar a calculadora no primeiro carregamento
        document.addEventListener('DOMContentLoaded', calcularReceita);

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor de Receitas de Pizza</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #0D0D0F;
            --surface: #1A1A1E;
            --surface-2: #222226;
            --text: #F0F0F3;
            --text-soft: #8A8A8F;
            --border: rgba(255, 255, 255, 0.08);
            --accent-primary: #FF9F0A; 
            --danger: #FF453A; /* Vermelho Apple para apagar */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Sistema de Abas (Tabs) ── */
        .tabs-wrapper {
            width: 100%;
            max-width: 420px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tabs-container {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding-bottom: 5px;
            scroll-behavior: smooth;
        }

        /* Esconder a scrollbar mas manter a funcionalidade */
        .tabs-container::-webkit-scrollbar { display: none; }
        .tabs-container { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-btn {
            background: var(--surface-2);
            color: var(--text-soft);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: rgba(255, 159, 10, 0.15);
            color: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .btn-add-tab {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* ── Container Principal ── */
        .calculadora-app {
            background: var(--surface);
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* ── Cabeçalho da Receita (Nome Editável) ── */
        .receita-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .input-nome-receita {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1.2rem;
            font-weight: 700;
            outline: none;
            width: 100%;
        }
        
        .input-nome-receita:focus {
            color: var(--accent-primary);
        }

        .btn-apagar {
            background: transparent;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
        }

        /* ── Entradas e Sliders (Reutilizados da versão anterior) ── */
        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .input-group { background: var(--surface-2); padding: 16px; border-radius: 12px; border: 1px solid var(--border); }
        .input-group label { display: block; color: var(--text-soft); font-size: 0.8rem; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
        .input-group input[type="number"] { width: 100%; background: transparent; border: none; color: var(--accent-primary); font-size: 1.8rem; font-weight: 700; outline: none; }

        .sliders-container { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
        .slider-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .slider-row:last-child { margin-bottom: 0; }
        .slider-label { width: 30%; font-size: 0.95rem; font-weight: 500; }
        .slider-input { width: 45%; }
        .slider-input input[type="range"] { width: 100%; -webkit-appearance: none; background: transparent; }
        .slider-input input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: var(--surface-2); border-radius: 4px; }
        .slider-input input[type="range"]::-webkit-slider-thumb { height: 24px; width: 24px; border-radius: 50%; background: #FFF; box-shadow: 0 2px 6px rgba(0,0,0,0.3); cursor: pointer; -webkit-appearance: none; margin-top: -9px; border: 1px solid var(--border); }
        .slider-value { width: 20%; text-align: right; font-weight: 600; color: var(--text-soft); }

        .resultados-container h3 { font-size: 1rem; margin-bottom: 16px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 1px; }
        .resultado-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 1.05rem; }
        .resultado-item:last-child { border-bottom: none; }
        .resultado-item .nome { font-weight: 500; }
        .resultado-item .valor { font-weight: 700; color: var(--text); }
        .resultado-item.destaque .valor { color: var(--accent-primary); font-size: 1.2rem;}
    </style>
</head>
<body>

    <div class="tabs-wrapper">
        <div class="tabs-container" id="tabs-container">
            </div>
        <button class="btn-add-tab" id="btn-nova-receita" title="Nova Receita">+</button>
    </div>

    <div class="calculadora-app">
        
        <div class="receita-header">
            <input type="text" id="input-nome-receita" class="input-nome-receita" placeholder="Nome da Receita">
            <button id="btn-apagar-receita" class="btn-apagar" title="Apagar Receita">🗑️</button>
        </div>
        
        <div class="header-grid">
            <div class="input-group">
                <label>Bolas</label>
                <input type="number" id="input-bolas" min="1" step="1">
            </div>
            <div class="input-group">
                <label>Peso (g)</label>
                <input type="number" id="input-peso" min="50" step="10">
            </div>
        </div>

        <div class="sliders-container">
            <div class="slider-row">
                <div class="slider-label">Água</div>
                <div class="slider-input"><input type="range" id="slider-agua" min="50" max="100" step="1"></div>
                <div class="slider-value" id="val-agua">0%</div>
            </div>
            <div class="slider-row">
                <div class="slider-label">Sal</div>
                <div class="slider-input"><input type="range" id="slider-sal" min="0" max="5" step="0.1"></div>
                <div class="slider-value" id="val-sal">0%</div>
            </div>
            <div class="slider-row">
                <div class="slider-label">Fermento</div>
                <div class="slider-input"><input type="range" id="slider-fermento" min="0" max="3" step="0.1"></div>
                <div class="slider-value" id="val-fermento">0%</div>
            </div>
            <div class="slider-row">
                <div class="slider-label">Azeite</div>
                <div class="slider-input"><input type="range" id="slider-azeite" min="0" max="10" step="0.5"></div>
                <div class="slider-value" id="val-azeite">0%</div>
            </div>
        </div>

        <div class="resultados-container">
            <h3>Receita Exata</h3>
            <div class="resultado-item destaque">
                <span class="nome">Massa Total</span>
                <span class="valor" id="res-total">0g</span>
            </div>
            <div class="resultado-item"><span class="nome">Farinha</span><span class="valor" id="res-farinha">0g</span></div>
            <div class="resultado-item"><span class="nome">Água</span><span class="valor" id="res-agua">0g</span></div>
            <div class="resultado-item"><span class="nome">Sal</span><span class="valor" id="res-sal">0g</span></div>
            <div class="resultado-item"><span class="nome">Fermento</span><span class="valor" id="res-fermento">0g</span></div>
            <div class="resultado-item"><span class="nome">Azeite</span><span class="valor" id="res-azeite">0g</span></div>
        </div>

    </div>

    <script>
        // ── ESTADO DA APLICAÇÃO ──
        // Array com todas as nossas receitas
        let receitas = [
            { id: 1, nome: "Pizza Napolitana", bolas: 4, peso: 250, agua: 65, sal: 2.5, fermento: 0.3, azeite: 0 },
            { id: 2, nome: "Massa Pan", bolas: 2, peso: 400, agua: 70, sal: 2.0, fermento: 1.0, azeite: 5.0 }
        ];
        let receitaAtivaId = 1; // Qual receita estamos a ver agora?

        // ── REFERÊNCIAS DO DOM ──
        const UI = {
            tabsContainer: document.getElementById('tabs-container'),
            btnNova: document.getElementById('btn-nova-receita'),
            btnApagar: document.getElementById('btn-apagar-receita'),
            
            nome: document.getElementById('input-nome-receita'),
            bolas: document.getElementById('input-bolas'),
            peso: document.getElementById('input-peso'),
            
            agua: document.getElementById('slider-agua'),
            sal: document.getElementById('slider-sal'),
            fermento: document.getElementById('slider-fermento'),
            azeite: document.getElementById('slider-azeite'),
            
            valAgua: document.getElementById('val-agua'),
            valSal: document.getElementById('val-sal'),
            valFermento: document.getElementById('val-fermento'),
            valAzeite: document.getElementById('val-azeite'),
            
            resTotal: document.getElementById('res-total'),
            resFarinha: document.getElementById('res-farinha'),
            resAgua: document.getElementById('res-agua'),
            resSal: document.getElementById('res-sal'),
            resFermento: document.getElementById('res-fermento'),
            resAzeite: document.getElementById('res-azeite')
        };

        // ── FUNÇÕES DE GESTÃO DE ABAS ──

        function renderizarAbas() {
            UI.tabsContainer.innerHTML = ''; // Limpar abas atuais

            receitas.forEach(receita => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${receita.id === receitaAtivaId ? 'active' : ''}`;
                btn.textContent = receita.nome;
                // Ao clicar na aba, carrega a receita respetiva
                btn.onclick = () => carregarReceita(receita.id);
                UI.tabsContainer.appendChild(btn);
            });
        }

        function carregarReceita(id) {
            receitaAtivaId = id;
            if (navigator.vibrate) navigator.vibrate(10);
            
            const receita = receitas.find(r => r.id === id);
            
            // Preencher os inputs com os dados da receita selecionada
            UI.nome.value = receita.nome;
            UI.bolas.value = receita.bolas;
            UI.peso.value = receita.peso;
            UI.agua.value = receita.agua;
            UI.sal.value = receita.sal;
            UI.fermento.value = receita.fermento;
            UI.azeite.value = receita.azeite;

            renderizarAbas(); // Atualiza a aba selecionada visualmente
            calcularReceita(); // Calcula a matemática
        }

        function criarNovaReceita() {
            if (navigator.vibrate) navigator.vibrate(20);
            const novoId = Date.now(); // Gera um ID único baseado no tempo
            const novaReceita = {
                id: novoId,
                nome: "Nova Receita",
                bolas: 4, peso: 250, agua: 60, sal: 2.0, fermento: 0.5, azeite: 2.0
            };
            receitas.push(novaReceita);
            carregarReceita(novoId);
            UI.tabsContainer.scrollLeft = UI.tabsContainer.scrollWidth; // Faz scroll para a nova aba
        }

        function apagarReceitaAtual() {
            if (receitas.length <= 1) {
                alert("Não podes apagar a única receita que tens!");
                return;
            }
            if (confirm("Tens a certeza que queres apagar esta receita?")) {
                receitas = receitas.filter(r => r.id !== receitaAtivaId);
                carregarReceita(receitas[0].id); // Volta para a primeira receita da lista
            }
        }

        // ── FUNÇÕES DE CÁLCULO E SINCRONIZAÇÃO ──

        function formataGrama(valor) {
            return Number(valor.toFixed(1)) + 'g';
        }

        function calcularReceita() {
            // 1. Obter valores do DOM
            const qtdBolas = parseInt(UI.bolas.value) || 1;
            const pesoBola = parseInt(UI.peso.value) || 1;
            const percAgua = parseFloat(UI.agua.value);
            const percSal = parseFloat(UI.sal.value);
            const percFermento = parseFloat(UI.fermento.value);
            const percAzeite = parseFloat(UI.azeite.value);

            // 2. Guardar as alterações no objeto da receita ativa (Sincronização)
            const receitaAtiva = receitas.find(r => r.id === receitaAtivaId);
            receitaAtiva.bolas = qtdBolas;
            receitaAtiva.peso = pesoBola;
            receitaAtiva.agua = percAgua;
            receitaAtiva.sal = percSal;
            receitaAtiva.fermento = percFermento;
            receitaAtiva.azeite = percAzeite;

            // 3. Atualizar etiquetas (labels) dos sliders
            UI.valAgua.textContent = percAgua + '%';
            UI.valSal.textContent = percSal.toFixed(1) + '%';
            UI.valFermento.textContent = percFermento.toFixed(1) + '%';
            UI.valAzeite.textContent = percAzeite.toFixed(1) + '%';

            // 4. Matemática de Padeiro
            const massaTotal = qtdBolas * pesoBola;
            const somaPercentagens = 1 + (percAgua/100) + (percSal/100) + (percFermento/100) + (percAzeite/100);
            const pesoFarinha = massaTotal / somaPercentagens;

            // 5. Renderizar na Tabela
            UI.resTotal.textContent = formataGrama(massaTotal);
            UI.resFarinha.textContent = formataGrama(pesoFarinha);
            UI.resAgua.textContent = formataGrama(pesoFarinha * (percAgua / 100));
            UI.resSal.textContent = formataGrama(pesoFarinha * (percSal / 100));
            UI.resFermento.textContent = formataGrama(pesoFarinha * (percFermento / 100));
            UI.resAzeite.textContent = formataGrama(pesoFarinha * (percAzeite / 100));
        }

        // ── EVENT LISTENERS (Ações do Utilizador) ──

        // Sincronizar mudança de Nome da Receita
        UI.nome.addEventListener('input', (e) => {
            const receitaAtiva = receitas.find(r => r.id === receitaAtivaId);
            receitaAtiva.nome = e.target.value;
            // Atualiza apenas o texto da aba ativa para não perder o foco do teclado
            document.querySelector('.tab-btn.active').textContent = receitaAtiva.nome;
        });

        // Atualiza a matemática em tempo real ao mexer nos inputs
        [UI.bolas, UI.peso, UI.agua, UI.sal, UI.fermento, UI.azeite].forEach(input => {
            input.addEventListener('input', () => {
                if (navigator.vibrate && input.type === 'range') navigator.vibrate(10);
                calcularReceita();
            });
        });

        // Botões
        UI.btnNova.addEventListener('click', criarNovaReceita);
        UI.btnApagar.addEventListener('click', apagarReceitaAtual);

        // ── ARRANQUE ──
        carregarReceita(1); // Arranca a app com a receita de ID 1

    </script>
</body>
</html>
